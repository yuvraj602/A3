# Local development defaults (no .env required).
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: bookstore
      MYSQL_USER: bookuser
      MYSQL_PASSWORD: bookpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_a3_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 25s

  customer-service:
    build: ./customer-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: bookstore
      DB_USER: bookuser
      DB_PASS: bookpass
    ports:
      - "3001:3000"

  book-service:
    build: ./book-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: bookstore
      DB_USER: bookuser
      DB_PASS: bookpass
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "3002:3000"

  internal-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - customer-service
      - book-service
    ports:
      - "3005:3000"
    volumes:
      - ./nginx-a3-internal.conf:/etc/nginx/conf.d/default.conf:ro

  web-bff:
    build: ./web-bff
    restart: unless-stopped
    depends_on:
      - internal-gateway
    environment:
      URL_BASE_BACKEND_SERVICES: http://internal-gateway:3000
    ports:
      - "8080:80"

  mobile-bff:
    build: ./mobile-bff
    restart: unless-stopped
    depends_on:
      - internal-gateway
    environment:
      URL_BASE_BACKEND_SERVICES: http://internal-gateway:3000
    ports:
      - "8081:80"

volumes:
  mysql_a3_data: