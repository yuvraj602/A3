# Template for the MySQL credentials Secret.
# Copy to `01-db-credentials.yaml`, fill in real values, then:
#   kubectl apply -f k8s/01-db-credentials.yaml
# (the real file is git-ignored).
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: bookstore-ns
type: Opaque
stringData:
  MYSQL_HOST: "bookstore-db-dev.cluster-xxxxxxxx.us-east-1.rds.amazonaws.com"
  MYSQL_PORT: "3306"
  MYSQL_USER: "bookuser"
  MYSQL_PASSWORD: "REPLACE_ME"
